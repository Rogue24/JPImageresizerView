<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JPImageresizerView README</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css" />

  <style>
    :root {
      --bgColor-default: #f3f5f9;
      --surface: #ffffff;
      --fgColor-default: #172033;
      --fgColor-muted: #5c667a;
      --line-soft: #d6dbe5;
      --link: #2a5bd7;
      --link-hover: #1f4fc7;
      --code-bg: #eef2f8;
      --quote: #8ea0c4;
      --selection: rgba(53, 104, 255, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(1200px 500px at 50% -200px, #ffffff 0%, rgba(255, 255, 255, 0) 70%),
        linear-gradient(180deg, #f5f7fb 0%, #eef2f8 100%);
      color: var(--fgColor-default);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .page {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 32px 40px;
    }

    .markdown-body {
      color-scheme: light;
      --color-canvas-default: var(--surface);
      --color-fg-default: var(--fgColor-default);
      --color-canvas-subtle: #f1f4fa;
      --color-border-default: var(--line-soft);
      margin: 0;
      font-size: 16px;
      line-height: 1.5;
      color: var(--fgColor-default);
      background: var(--surface);
      border-radius: 14px;
      padding: 28px 32px;
      box-shadow:
        0 1px 1px rgba(16, 24, 40, 0.03),
        0 12px 28px rgba(16, 24, 40, 0.06);
    }

    .markdown-body img { max-width: 100%; height: auto; }
    .markdown-body table { display: block; width: max-content; max-width: 100%; overflow: auto; }
    .markdown-body ::selection { background: var(--selection); }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      color: #10182a;
      border-bottom-color: var(--line-soft);
    }

    .markdown-body p,
    .markdown-body li { color: #202b3f; }

    .markdown-body a { color: var(--link); text-decoration: none; }
    .markdown-body a:hover { color: var(--link-hover); text-decoration: underline; }
    .markdown-body hr { border-color: var(--line-soft); }

    .markdown-body blockquote {
      color: #44506a;
      border-left-color: var(--quote);
      background: #f6f8fc;
      border-radius: 0 8px 8px 0;
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .markdown-body code,
    .markdown-body tt {
      background-color: var(--code-bg);
      color: #27324a;
    }

    .markdown-body pre {
      background: #0f172a;
      border: 1px solid #2b3a57;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .markdown-body pre code {
      background: transparent;
      color: #d8e4ff;
    }

    .note {
      margin: 12px 4px 0;
      color: var(--fgColor-muted);
      font-size: 13px;
      line-height: 1.5;
      display: none;
      white-space: pre-line;
    }

    @media (max-width: 768px) {
      .page { padding: 14px 14px 24px; }
      .markdown-body { font-size: 15px; padding: 18px 16px; border-radius: 10px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <article id="content" class="markdown-body"></article>
    <p id="note" class="note"></p>
  </main>

  <script>
    function showNote(text) {
      const noteEl = document.getElementById("note");
      noteEl.textContent = text;
      noteEl.style.display = "block";
    }

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = url;
        script.async = true;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function ensureMarked() {
      if (window.marked) return true;
      const urls = [
        "https://cdn.jsdelivr.net/npm/marked/marked.min.js",
        "https://unpkg.com/marked/marked.min.js"
      ];
      for (const url of urls) {
        try {
          await loadScript(url);
          if (window.marked) return true;
        } catch (_) {}
      }
      return false;
    }

    async function loadReadmeText() {
      const resp = await fetch("../README.md", { cache: "no-store" });
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      return resp.text();
    }

    function loadReadmeTextFromIframe() {
      return new Promise((resolve, reject) => {
        const frame = document.createElement("iframe");
        frame.style.display = "none";
        frame.src = "../README.md";
        frame.onload = () => {
          try {
            const doc = frame.contentDocument || frame.contentWindow.document;
            const text = (doc && doc.body && doc.body.innerText) ? doc.body.innerText : "";
            frame.remove();
            if (!text.trim()) {
              reject(new Error("Empty iframe content"));
              return;
            }
            resolve(text);
          } catch (e) {
            frame.remove();
            reject(e);
          }
        };
        frame.onerror = (e) => {
          frame.remove();
          reject(e);
        };
        document.body.appendChild(frame);
      });
    }

    (async function init() {
      const contentEl = document.getElementById("content");

      let markdown = "";
      try {
        markdown = await loadReadmeText();
      } catch (_) {
        try {
          markdown = await loadReadmeTextFromIframe();
        } catch (_) {
          contentEl.textContent = "无法直接读取 README.md";
          showNote("当前很可能是以 file:// 方式打开，浏览器会拦截本地 fetch。\n请在 Readme 目录启动本地服务后访问：\npython3 -m http.server 8080\nhttp://127.0.0.1:8080/index.html");
          return;
        }
      }

      const hasMarked = await ensureMarked();
      if (!hasMarked) {
        contentEl.textContent = markdown;
        showNote("未能加载 Markdown 渲染库，当前为纯文本显示。请检查网络后刷新。");
        return;
      }

      window.marked.setOptions({
        gfm: true,
        breaks: false,
        mangle: false,
        headerIds: true
      });
      contentEl.innerHTML = window.marked.parse(markdown);
    })();
  </script>
</body>
</html>
