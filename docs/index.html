<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">

  <style>
    :root {
      --bg-0: #000000;
      --bg-1: #07080c;
      --bg-2: #111319;
      --text: #f5f5f7;
      --muted: #a1a1a6;
      --line: rgba(255, 255, 255, 0.14);
      --apple-blue: #0a84ff;
      --panel-bg: rgba(14, 18, 27, 0.76);
      --panel-line: rgba(255, 255, 255, 0.12);
      --panel-text: #edf1ff;
      --panel-subtle: #a8b1c7;
      --panel-border: #2a3142;
      --code-bg: #060b14;
      --code-line: #2e3d59;
      --code-text: #dbe8ff;
      --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color-scheme: dark;
      color: var(--text);
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Segoe UI", sans-serif;
      background:
        radial-gradient(1180px 520px at 50% -14%, rgba(66, 146, 255, 0.33), rgba(66, 146, 255, 0) 72%),
        radial-gradient(780px 380px at 88% 24%, rgba(88, 142, 255, 0.24), rgba(88, 142, 255, 0) 74%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 42%, var(--bg-2) 100%);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.06;
      background-image: radial-gradient(#fff 0.45px, transparent 0.45px);
      background-size: 2.4px 2.4px;
      mix-blend-mode: soft-light;
    }

    .global-nav {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: saturate(160%) blur(20px);
      -webkit-backdrop-filter: saturate(160%) blur(20px);
      background: rgba(10, 10, 12, 0.64);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      height: 48px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      overflow: hidden;
    }

    .nav-title {
      margin: 0;
      font-size: 12px;
      color: #f5f5f7;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 48%;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav-links::-webkit-scrollbar {
      display: none;
    }

    .nav-link {
      text-decoration: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
      transition: color 180ms var(--ease);
    }

    .nav-link:hover,
    .nav-link.active {
      color: #fff;
    }

    .progress-track {
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #0a84ff 0%, #5ac8fa 100%);
      box-shadow: 0 0 14px rgba(41, 151, 255, 0.66);
      transition: width 90ms linear;
    }

    .page {
      position: relative;
      z-index: 1;
    }

    .hero {
      position: relative;
      overflow: hidden;
      min-height: clamp(280px, 50vw, 620px);
      padding: clamp(46px, 8vw, 92px) 16px clamp(36px, 6vw, 70px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-bg {
      position: absolute;
      inset: -24% -14% auto;
      height: 130%;
      pointer-events: none;
      background:
        radial-gradient(38% 42% at 26% 28%, rgba(137, 201, 255, 0.62), rgba(137, 201, 255, 0) 70%),
        radial-gradient(44% 42% at 75% 26%, rgba(92, 148, 255, 0.54), rgba(92, 148, 255, 0) 74%),
        radial-gradient(56% 46% at 52% 82%, rgba(92, 108, 255, 0.28), rgba(92, 108, 255, 0) 74%);
      filter: blur(16px);
      opacity: 0.75;
      animation: heroFloat 16s var(--ease) infinite alternate;
    }

    .hero-inner {
      position: relative;
      width: min(1200px, 100%);
      text-align: center;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(50px, 11vw, 132px);
      line-height: 0.9;
      letter-spacing: -0.045em;
      font-weight: 600;
      text-wrap: balance;
    }

    .hero-lead {
      margin: clamp(14px, 2.6vw, 24px) auto 0;
      width: min(820px, 100%);
      color: #d3d3d8;
      font-size: clamp(18px, 2.2vw, 32px);
      line-height: 1.28;
      letter-spacing: -0.02em;
      text-wrap: balance;
    }

    .hero-lead:empty {
      display: none;
    }

    .hero-badges {
      margin-top: clamp(14px, 2.2vw, 24px);
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .hero-badges:empty {
      display: none;
    }

    .hero-badges p {
      margin: 0;
    }

    .hero-badges img {
      height: 20px;
      width: auto;
      display: inline-block;
      vertical-align: middle;
    }

    .hero-actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-btn {
      text-decoration: none;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      background: rgba(18,22,30,0.7);
      transition: all 180ms var(--ease);
      backdrop-filter: blur(8px);
    }

    .hero-btn:hover {
      border-color: rgba(255,255,255,0.35);
      background: rgba(30,40,60,0.85);
    }

    .hero-btn.primary {
      background: linear-gradient(135deg,#0a84ff,#5ac8fa);
      border: none;
      color: #fff;
      box-shadow: 0 6px 22px rgba(41,151,255,0.45);
    }

    .hero-btn.primary:hover {
      filter: brightness(1.05);
    }

    .content-wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 16px 54px;
    }

    .content-shell {
      border-radius: clamp(20px, 3vw, 36px);
      background: var(--panel-bg);
      border: 1px solid var(--panel-line);
      box-shadow: 0 28px 84px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: clamp(14px, 2.4vw, 30px);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 250px;
      gap: 18px;
      align-items: start;
    }

    .toc {
      position: sticky;
      top: 72px;
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      background: rgba(10, 14, 22, 0.74);
      padding: 10px;
      max-height: calc(100vh - 92px);
      overflow: auto;
    }

    .toc.hidden {
      display: none;
    }

    .toc-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .toc-link {
      display: block;
      text-decoration: none;
      color: #a8b5d1;
      font-size: 13px;
      line-height: 1.35;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: color 180ms var(--ease), background-color 180ms var(--ease), border-color 180ms var(--ease);
    }

    .toc-link:hover {
      color: #d9e7ff;
      background: rgba(120, 154, 231, 0.13);
      border-color: rgba(140, 169, 237, 0.24);
    }

    .toc-link.active {
      color: #fff;
      background: rgba(103, 145, 255, 0.24);
      border-color: rgba(141, 176, 255, 0.34);
    }

    .toc-link.level-3 {
      font-size: 12px;
      color: #93a1bf;
      padding-left: 16px;
    }

    .markdown-body {
      margin: 0;
      color-scheme: dark;
      --color-canvas-default: transparent;
      --color-fg-default: var(--panel-text);
      --color-fg-muted: var(--panel-subtle);
      --color-canvas-subtle: #111723;
      --color-border-default: var(--panel-border);
      --color-border-muted: var(--panel-border);
      --color-accent-fg: #6ea8ff;
      --bgColor-default: transparent;
      --bgColor-muted: #111723;
      --fgColor-default: var(--panel-text);
      --fgColor-muted: var(--panel-subtle);
      --fgColor-accent: #6ea8ff;
      --borderColor-default: var(--panel-border);
      --borderColor-muted: var(--panel-border);
      background: transparent;
      color: var(--panel-text);
      font-size: clamp(16px, 1.5vw, 19px);
      line-height: 1.8;
      letter-spacing: -0.003em;
      font-weight: 400;
      overflow-wrap: break-word;
    }

    .markdown-body > * {
      opacity: 0;
      transform: translateY(14px);
      filter: blur(3px);
      transition: opacity 560ms var(--ease), transform 560ms var(--ease), filter 560ms var(--ease);
    }

    .markdown-body > *.reveal {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      color: var(--panel-text);
      border-bottom-color: var(--panel-border);
      letter-spacing: -0.03em;
    }

    .markdown-body h1 {
      font-size: clamp(38px, 6vw, 78px);
      line-height: 0.98;
      margin-top: 0;
    }

    .markdown-body h2 {
      font-size: clamp(30px, 4.6vw, 54px);
      line-height: 1.03;
    }

    .markdown-body h3 {
      font-size: clamp(24px, 3.6vw, 36px);
      line-height: 1.12;
    }

    .markdown-body p,
    .markdown-body li {
      color: #d6def1;
    }

    .markdown-body a {
      color: #7ab2ff;
      text-decoration: none;
    }

    .markdown-body a:hover {
      color: #a8cdff;
      text-decoration: underline;
    }

    .markdown-body blockquote {
      color: #b7c4dc;
      border-left-color: #7082a9;
      background: rgba(20, 28, 44, 0.55);
      border-radius: 0 10px 10px 0;
      padding-top: 10px;
      padding-bottom: 10px;
    }

    .markdown-body hr {
      border-color: var(--panel-border);
    }

    .markdown-body table {
      background: rgba(10, 14, 22, 0.62);
      border-radius: 12px;
      overflow: hidden;
    }

    .markdown-body table tr {
      background: rgba(10, 14, 22, 0.72) !important;
      border-top-color: var(--panel-border) !important;
    }

    .markdown-body table tr:nth-child(2n) {
      background: rgba(17, 23, 35, 0.92) !important;
    }

    .markdown-body table th,
    .markdown-body table td {
      color: #d6def1 !important;
      border-color: var(--panel-border) !important;
      background: transparent !important;
    }

    .markdown-body img {
      max-width: 100%;
      height: auto;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow:
        0 30px 72px rgba(0, 0, 0, 0.62),
        0 10px 26px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      background: transparent;
    }

    .markdown-body pre {
      background: var(--code-bg);
      border: 1px solid var(--code-line);
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .markdown-body pre code {
      color: var(--code-text);
      background: transparent;
    }

    .markdown-body code,
    .markdown-body tt {
      color: #e3edff;
      background: rgba(130, 161, 255, 0.16);
      border-radius: 7px;
      padding: 0.16em 0.34em;
      font-size: 0.88em;
    }

    @keyframes heroFloat {
      0% {
        transform: translateY(0) scale(1);
      }
      100% {
        transform: translateY(-12px) scale(1.04);
      }
    }

    @media (max-width: 1080px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      .toc {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .nav-title {
        max-width: 42%;
      }

      .hero {
        min-height: 0;
        padding-top: 42px;
        padding-bottom: 34px;
      }

      .hero-title {
        font-size: clamp(42px, 12vw, 84px);
      }

      .hero-lead {
        font-size: clamp(16px, 5.5vw, 22px);
      }

      .content-wrap {
        padding-left: 10px;
        padding-right: 10px;
      }

      .content-shell {
        border-radius: 18px;
        padding: 14px;
      }

      .markdown-body {
        font-size: 15px;
        line-height: 1.75;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .hero-bg {
        animation: none;
      }

      .progress,
      .toc-link,
      .nav-link,
      .markdown-body > * {
        transition: none;
      }

      .markdown-body > * {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <header class="global-nav">
    <div class="nav-inner">
      <p id="navTitle" class="nav-title"></p>
      <nav id="navLinks" class="nav-links"></nav>
    </div>
    <div class="progress-track"><div id="progress" class="progress"></div></div>
  </header>

  <main class="page">
    <section class="hero">
      <div class="hero-bg" aria-hidden="true"></div>
      <div class="hero-inner">
        <h1 id="heroTitle" class="hero-title"></h1>
        <div id="heroLead" class="hero-lead"></div>
        <div id="heroBadges" class="hero-badges"></div>
        <div id="heroActions" class="hero-actions"></div>
      </div>
    </section>

    <section class="content-wrap">
      <div class="content-shell">
        <div class="content-grid">
          <article id="content" class="markdown-body" data-color-mode="dark" data-light-theme="dark" data-dark-theme="dark" aria-live="polite"></article>
          <aside id="toc" class="toc hidden">
            <nav id="tocList" class="toc-list"></nav>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
  <script src="./js/readme_resource.js"></script>
  <script>
    function loadScript(url) {
      return new Promise(function(resolve, reject) {
        var script = document.createElement("script");
        script.src = url;
        script.async = true;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function ensureMarked() {
      if (window.marked) return true;
      var urls = [
        "https://cdn.jsdelivr.net/npm/marked/marked.min.js",
        "https://unpkg.com/marked/marked.min.js"
      ];
      for (var i = 0; i < urls.length; i += 1) {
        try {
          await loadScript(urls[i]);
          if (window.marked) return true;
        } catch (_) {}
      }
      return false;
    }

    async function loadReadmeText() {
      var paths = [
        "/README.md",
        "../README.md",
        "./README.md"
      ];

      for (var i = 0; i < paths.length; i += 1) {
        try {
          var resp = await fetch(paths[i], { cache: "no-store" });
          if (resp.ok) {
            return await resp.text();
          }
        } catch (_) {}
      }

      throw new Error("Unable to load README.md");
    }

    function loadReadmeTextFromIframe() {
      return new Promise(function(resolve, reject) {
        var frame = document.createElement("iframe");
        frame.style.display = "none";
        frame.src = "../README.md";

        frame.onload = function() {
          try {
            var doc = frame.contentDocument || frame.contentWindow.document;
            var text = doc && doc.body && doc.body.innerText ? doc.body.innerText : "";
            frame.remove();
            if (!text.trim()) {
              reject(new Error("Empty iframe content"));
              return;
            }
            resolve(text);
          } catch (e) {
            frame.remove();
            reject(e);
          }
        };

        frame.onerror = function(e) {
          frame.remove();
          reject(e);
        };

        document.body.appendChild(frame);
      });
    }

    function loadReadmeTextFromResource() {
      if (typeof window.__README_MD__ === "string") {
        var text = window.__README_MD__;
        if (text.trim()) return text;
      }
      return "";
    }

    function ensureHeadingIds(headings) {
      var used = new Set();
      headings.forEach(function(h, idx) {
        if (h.id) {
          used.add(h.id);
          return;
        }
        var base = (h.textContent || "")
          .trim()
          .toLowerCase()
          .replace(/[^\w\u4e00-\u9fa5- ]/g, "")
          .replace(/\s+/g, "-")
          .slice(0, 80) || ("section-" + (idx + 1));

        var id = base;
        var n = 2;
        while (used.has(id) || document.getElementById(id)) {
          id = base + "-" + n;
          n += 1;
        }
        h.id = id;
        used.add(id);
      });
    }

    function setupProgress() {
      var progress = document.getElementById("progress");
      if (!progress) return;

      var update = function() {
        var max = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
        var p = Math.min(100, (window.scrollY / max) * 100);
        progress.style.width = p.toFixed(2) + "%";
      };

      update();
      window.addEventListener("scroll", update, { passive: true });
      window.addEventListener("resize", update);
    }

    function setupReveal() {
      var targets = Array.from(document.querySelectorAll(".markdown-body > *"));
      if (!targets.length) return;

      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("reveal");
            io.unobserve(entry.target);
          }
        });
      }, {
        rootMargin: "0px 0px -8% 0px",
        threshold: 0.04
      });

      targets.forEach(function(el, idx) {
        el.style.transitionDelay = Math.min(idx * 18, 220) + "ms";
        io.observe(el);
      });
    }

    function enhanceCodeBlocks() {
      document.querySelectorAll("pre code").forEach(function(block) {
        if (window.hljs) {
          hljs.highlightElement(block);
        }

        var pre = block.parentElement;
        if (!pre || pre.querySelector(".copy-btn")) return;

        var btn = document.createElement("button");
        btn.className = "copy-btn";
        btn.textContent = "copy";

        btn.style.position = "absolute";
        btn.style.top = "10px";
        btn.style.right = "10px";
        btn.style.padding = "4px 8px";
        btn.style.fontSize = "12px";
        btn.style.borderRadius = "6px";
        btn.style.border = "1px solid rgba(255,255,255,0.2)";
        btn.style.background = "rgba(20,20,24,0.8)";
        btn.style.color = "#fff";
        btn.style.cursor = "pointer";

        pre.style.position = "relative";
        pre.appendChild(btn);

        btn.onclick = function() {
          navigator.clipboard.writeText(block.innerText).then(function() {
            btn.textContent = "copied";
            setTimeout(function() {
              btn.textContent = "copy";
            }, 1200);
          });
        };
      });
    }

    function setTopTitle(text) {
      var title = text || "";
      var navTitle = document.getElementById("navTitle");
      var heroTitle = document.getElementById("heroTitle");
      if (title) document.title = title;
      if (navTitle) navTitle.textContent = title;
      if (heroTitle) heroTitle.textContent = title;
    }

    var heroMenuLinks = [];
    var heroActionLinks = [];

    function pickHeroContent(tempRoot) {
      var heroLead = document.getElementById("heroLead");
      var heroBadges = document.getElementById("heroBadges");
      if (!heroLead || !heroBadges) return;

      heroMenuLinks = [];
      heroLead.textContent = "";
      heroBadges.innerHTML = "";

      var children = Array.from(tempRoot.children);
      var h1Index = children.findIndex(function(node) {
        return node.tagName && node.tagName.toLowerCase() === "h1";
      });

      if (h1Index < 0) {
        heroLead.textContent = "";
        return;
      }

      var h1 = children[h1Index];
      setTopTitle((h1.textContent || "").trim());
      h1.remove();

      var hasTakenMenuLinks = false;
      var after = Array.from(tempRoot.children);
      for (var i = 0; i < after.length; i += 1) {
        var node = after[i];
        var tag = node.tagName ? node.tagName.toLowerCase() : "";
        if (tag === "h2") break;
        if (tag !== "p") continue;

        var text = (node.textContent || "").trim();
        var hasImg = node.querySelector("img") !== null;
        var anchors = Array.from(node.querySelectorAll("a[href]"));

        if (hasImg) {
          heroBadges.appendChild(node.cloneNode(true));
          node.remove();
          continue;
        }

        if (!hasTakenMenuLinks && anchors.length >= 2) {
          var topAnchors = anchors.slice(0, 2);
          heroMenuLinks = topAnchors.map(function(src) {
            return {
              href: src.getAttribute("href") || src.href || "",
              text: (src.textContent || "").trim()
            };
          }).filter(function(item) {
            return item.href && item.text;
          });

          if (anchors.length > 2 && !heroLead.textContent) {
            var subtitle = (anchors[2].textContent || "").trim();
            if (subtitle) heroLead.textContent = subtitle;
          }

          hasTakenMenuLinks = true;
          node.remove();
          // Insert heroActionLinks assignment after heroMenuLinks assignment
          heroActionLinks = heroMenuLinks.slice(0);
          continue;
        }

        if (text && !heroLead.textContent) {
          heroLead.textContent = text;
          node.remove();
        }
      }
    }

    function buildNavAndToc() {
      var navLinks = document.getElementById("navLinks");
      var toc = document.getElementById("toc");
      var tocList = document.getElementById("tocList");
      if (!navLinks || !toc || !tocList) return [];

      var headings = Array.from(document.querySelectorAll(".markdown-body h2, .markdown-body h3"));
      ensureHeadingIds(headings);
      navLinks.innerHTML = "";
      tocList.innerHTML = "";

      if (!headings.length) {
        toc.classList.add("hidden");
        return [];
      }

      var navSeeds = headings.filter(function(h) {
        return h.tagName.toLowerCase() === "h2";
      }).slice(0, 4);

      navSeeds.forEach(function(h) {
        var link = document.createElement("a");
        link.className = "nav-link";
        link.href = "#" + h.id;
        link.dataset.target = h.id;
        link.textContent = h.textContent || h.id;
        navLinks.appendChild(link);
      });

      heroMenuLinks.forEach(function(item) {
        var link = document.createElement("a");
        link.className = "nav-link";
        link.href = item.href;
        link.textContent = item.text;
        if (/^https?:\/\//i.test(item.href)) {
          link.target = "_blank";
          link.rel = "noopener noreferrer";
        }
        navLinks.appendChild(link);
      });

      headings.forEach(function(h) {
        var link = document.createElement("a");
        link.className = "toc-link level-" + h.tagName.toLowerCase().replace("h", "");
        link.href = "#" + h.id;
        link.dataset.target = h.id;
        link.textContent = h.textContent || h.id;
        tocList.appendChild(link);
      });

      toc.classList.remove("hidden");
      return headings;
    }

    function renderHeroActions() {
      var container = document.getElementById("heroActions");
      if (!container) return;

      container.innerHTML = "";

      heroActionLinks.forEach(function(item, index) {
        var link = document.createElement("a");
        link.className = "hero-btn" + (index === 0 ? " primary" : "");
        link.href = item.href;
        link.textContent = item.text;

        if (/^https?:\/\//i.test(item.href)) {
          link.target = "_blank";
          link.rel = "noopener noreferrer";
        }

        container.appendChild(link);
      });
    }

    function setupSpy(headings) {
      var links = Array.from(document.querySelectorAll(".toc-link"));
      var navLinks = Array.from(document.querySelectorAll(".nav-link"));
      if (!headings.length) return;

      var setActive = function(id) {
        links.forEach(function(link) {
          link.classList.toggle("active", link.dataset.target === id);
        });
        navLinks.forEach(function(link) {
          link.classList.toggle("active", link.dataset.target === id);
        });
      };

      var update = function() {
        var marker = window.scrollY + 126;
        var current = headings[0].id;
        for (var i = 0; i < headings.length; i += 1) {
          if (headings[i].offsetTop <= marker) current = headings[i].id;
          else break;
        }
        setActive(current);
      };

      update();
      window.addEventListener("scroll", update, { passive: true });
      window.addEventListener("resize", update);
    }

    (async function init() {
      var contentEl = document.getElementById("content");
      if (!contentEl) return;

      document.documentElement.setAttribute("data-color-mode", "dark");
      document.documentElement.setAttribute("data-light-theme", "dark");
      document.documentElement.setAttribute("data-dark-theme", "dark");
      document.body.setAttribute("data-color-mode", "dark");
      document.body.setAttribute("data-light-theme", "dark");
      document.body.setAttribute("data-dark-theme", "dark");
      contentEl.setAttribute("data-color-mode", "dark");
      contentEl.setAttribute("data-light-theme", "dark");
      contentEl.setAttribute("data-dark-theme", "dark");

      var markdown = "";
      var protocol = window.location.protocol;

      if (protocol === "file:") {
        markdown = loadReadmeTextFromResource();
        if (!markdown) {
          try {
            markdown = await loadReadmeTextFromIframe();
          } catch (_) {
            try {
              markdown = await loadReadmeText();
            } catch (e) {
              console.error(e);
              return;
            }
          }
        }
      } else {
        try {
          markdown = await loadReadmeText();
        } catch (_) {
          markdown = loadReadmeTextFromResource();
          if (!markdown) {
            try {
              markdown = await loadReadmeTextFromIframe();
            } catch (e) {
              console.error(e);
              return;
            }
          }
        }
      }

      var hasMarked = await ensureMarked();
      if (!hasMarked) {
        contentEl.textContent = markdown;
        setupProgress();
        setupReveal();
        return;
      }

      window.marked.setOptions({
        gfm: true,
        breaks: false,
        mangle: false,
        headerIds: false
      });

      var temp = document.createElement("div");
      temp.innerHTML = window.marked.parse(markdown);

      pickHeroContent(temp);

      contentEl.innerHTML = temp.innerHTML;
      var headings = buildNavAndToc();
      renderHeroActions();
      setupSpy(headings);
      setupProgress();
      setupReveal();
      enhanceCodeBlocks();
    })();
  </script>
</body>
</html>
